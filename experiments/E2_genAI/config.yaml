## Configuracao do experimento (`config.yaml`)

source:
  e1_csv_path: "../E1_cluster/output_bertopic_clusters.csv"

aggregation:
  drop_noise: true
  min_relato_len: 8
  examples_per_topic: 8
  top_terms_k: 8
  sample_method: "hash"   # "hash" (deterministico) ou "head"

llm:
  provider: "ollama"
  model: "llama3:latest" 
  timeout_sec: 120
  retries: 1
  batch_size: 20

rules:
  taxonomy_version: "macrothemes_v1_operacional_2026_03"
  thresholds:
    confidence_low_threshold: "LOW"
    emergent_min_volume_abs: 5
    emergent_min_volume_pct: 0.02
  forbid_new_macrothemes: true

run:
  outputs_base_dir: "./outputs/runs"
  prompt_version: "e2_v3_operational_taxonomy"
